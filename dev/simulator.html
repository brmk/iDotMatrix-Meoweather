<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iDotMatrix Simulator</title>
  <style>
    body {
      background: #1a1a1a;
      color: #ccc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 14px; letter-spacing: 2px; color: #888; }
    canvas {
      image-rendering: pixelated;
      border: 1px solid #444;
      background: #000;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 400px;
    }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #888; }
    select, input[type=number], input[type=range] {
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #555;
      padding: 4px 6px;
      font-family: monospace;
      font-size: 12px;
    }
    button {
      background: #333;
      color: #ddd;
      border: 1px solid #555;
      padding: 5px 10px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    button:hover { background: #444; }
    button.active { background: #1a3a1a; border-color: #4a8; color: #8f8; }
    .behavior-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: #888;
    }
    .behavior-row .btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .info { font-size: 10px; color: #555; min-height: 14px; }
  </style>
</head>
<body>
  <h1>iDotMatrix 32×32 Simulator</h1>
  <canvas id="c" width="320" height="320"></canvas>
  <div class="info" id="info">loading...</div>
  <div class="controls">
    <label>
      Weather
      <select id="icon">
        <option value="0_day">☀️  Clear Day</option>
        <option value="0_night">🌙  Clear Night</option>
        <option value="2">⛅  Partly Cloudy</option>
        <option value="3">☁️  Cloudy</option>
        <option value="45">🌫️  Fog</option>
        <option value="61">🌧️  Rain</option>
        <option value="82">⛈️  Heavy Rain</option>
        <option value="71">❄️  Snow</option>
        <option value="95">⚡  Thunder</option>
      </select>
    </label>
    <label>
      Temp (°C)
      <input id="temp" type="number" value="20" min="-30" max="50" style="width:60px">
    </label>
    <label>
      Night mode
      <input id="night" type="checkbox">
    </label>
    <label>
      Speed ×<span id="speedVal">1.0</span>
      <input id="speed" type="range" min="0.25" max="4" step="0.25" value="1" style="width:110px">
    </label>
    <div class="behavior-row">
      Force behavior
      <div class="btns" id="behaviorBtns">
        <button data-behavior="walk">walk</button>
        <button data-behavior="sit">sit</button>
        <button data-behavior="lie">lie</button>
        <button data-behavior="jump">jump</button>
        <button data-behavior="perch">perch</button>
        <button data-behavior="dream">dream</button>
      </div>
    </div>
  </div>

  <script src="./render.js"></script>
  <script>
    const {
      renderAnimation, drawPet,
      PET_Y_WALK, PET_WIDTH,
      advancePet, makePetContext,
    } = SimLib;

    const canvas = document.getElementById("c");
    const ctx    = canvas.getContext("2d");
    const offscreen = document.createElement("canvas");
    offscreen.width = 32;
    offscreen.height = 32;
    const octx = offscreen.getContext("2d");

    // ---- Controls ----
    const iconSel  = document.getElementById("icon");
    const tempInp  = document.getElementById("temp");
    const nightChk = document.getElementById("night");
    const speedSld = document.getElementById("speed");
    const speedVal = document.getElementById("speedVal");
    const infoEl   = document.getElementById("info");

    speedSld.addEventListener("input", () => {
      speedVal.textContent = Number.parseFloat(speedSld.value).toFixed(2);
    });

    function getSnapshot() {
      const raw = iconSel.value;
      const night = nightChk.checked;
      let weatherCode, isDay;
      if (raw === "0_night") {
        weatherCode = 0; isDay = false;
      } else {
        weatherCode = Number.parseInt(raw, 10);
        isDay = !night;
      }
      return {
        weatherCode,
        temperature: Number.parseInt(tempInp.value, 10) || 0,
        isDay,
      };
    }

    // ---- Pet state ----
    let pet = {
      x: 0,
      facingRight: true,
      behavior: "walk",
      walkFrame: 0,
      behaviorFrame: 0,
      tailPhase: 0,
      isDay: true,
      eyesClosed: false,
      perchY: PET_Y_WALK,
    };
    let petCtx = makePetContext();

    // Durations that match the real game probabilities
    const BEHAVIOR_DUR = { walk: 0, sit: 60, lie: 80, jump: 8, perch: 12, dream: 120 };

    const behaviorBtns = document.querySelectorAll("#behaviorBtns button");

    function updateBehaviorButtons() {
      for (const btn of behaviorBtns) {
        btn.classList.toggle("active", btn.dataset.behavior === pet.behavior);
      }
    }

    for (const btn of behaviorBtns) {
      btn.addEventListener("click", () => {
        const b = btn.dataset.behavior;
        pet.behavior = b;
        pet.behaviorFrame = 0;
        petCtx.behaviorDur = BEHAVIOR_DUR[b] ?? 0;
        if (b === "perch") pet.perchY = PET_Y_WALK; // reset arc start
        updateBehaviorButtons();
      });
    }

    // ---- Render loop ----
    let frameIdx      = 0;
    let lastFrameTime = 0;
    let lastInfoTime  = 0;
    let tickCount     = 0;

    function loop(ts) {
      requestAnimationFrame(loop);

      const snap   = getSnapshot();
      const frames = renderAnimation(snap);
      if (!frames.length) return;

      const speed = Number.parseFloat(speedSld.value);
      const f     = frames[frameIdx % frames.length];
      const delay = f.delayMs / speed;

      if (ts - lastFrameTime < delay) return;
      lastFrameTime = ts;

      pet.isDay = snap.isDay;
      const prevBehavior = pet.behavior;
      advancePet(pet, petCtx);
      if (pet.behavior !== prevBehavior) updateBehaviorButtons();

      const pixels = new Uint8Array(f.pixels);
      drawPet(pixels, pet);

      // Write 32×32 pixels → offscreen canvas → scale up 10×
      const imgData = octx.createImageData(32, 32);
      for (let i = 0; i < 32 * 32; i++) {
        imgData.data[i * 4 + 0] = pixels[i * 3 + 0];
        imgData.data[i * 4 + 1] = pixels[i * 3 + 1];
        imgData.data[i * 4 + 2] = pixels[i * 3 + 2];
        imgData.data[i * 4 + 3] = 255;
      }
      octx.putImageData(imgData, 0, 0);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(offscreen, 0, 0, 320, 320);

      frameIdx = (frameIdx + 1) % frames.length;
      tickCount++;

      if (ts - lastInfoTime >= 1000) {
        infoEl.textContent =
          `${tickCount} fps  ·  delay ${f.delayMs}ms  ·  pet: ${pet.behavior}  ·  x: ${pet.x}  ·  perchY: ${pet.perchY}`;
        tickCount    = 0;
        lastInfoTime = ts;
      }
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
