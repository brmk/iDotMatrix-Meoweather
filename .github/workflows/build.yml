name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/led-matrix-idotmatrix-app:main
            ghcr.io/${{ github.repository_owner }}/led-matrix-idotmatrix-app:${{ github.sha }}

      - name: Build and push sidecar image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.sidecar
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/led-matrix-idotmatrix-sidecar:main
            ghcr.io/${{ github.repository_owner }}/led-matrix-idotmatrix-sidecar:${{ github.sha }}
